<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming soon — Volition Guides</title>
  <link rel="icon" type="image/png" href="../org-staff/assets/favicon.png">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Outfit", sans-serif;
      background: var(--sand-100);
      color: var(--text-dark);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: var(--space-6) var(--space-6) var(--space-5);
      border-bottom: 1px solid var(--divider-default);
    }

    header img {
      height: 32px;
      display: block;
    }

    main {
      flex: 1;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      justify-content: center;
    }

    .label {
      font-size: var(--fs-small);
      font-weight: var(--font-weight-semibold);
      color: var(--text-mid);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      font-size: var(--fs-xxl);
      font-weight: var(--font-weight-semibold);
      line-height: var(--lh-xxl);
      color: var(--text-dark);
    }

    p {
      font-size: var(--fs-body-lg);
      line-height: var(--lh-body-lg);
      color: var(--text-dark);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--fs-base);
      font-weight: var(--font-weight-medium);
      color: var(--text-dark);
      text-decoration: underline;
      text-decoration-thickness: 8%;
      text-underline-offset: 4px;
      margin-top: var(--space-3);
    }

    .back-link:hover {
      color: var(--text-mid);
    }

    footer {
      padding: var(--space-6);
      text-align: center;
      font-size: var(--fs-small);
      color: var(--text-mid);
      border-top: 1px solid var(--divider-default);
    }
  </style>
</head>
<body>

  <header>
    <a href=".."><img src="../logos/../logos/logo-wordmark-v2.svg" alt="Volition"></a>
  </header>

  <main>
    <p class="label">Coming soon</p>
    <h1>This guide is on its way.</h1>
    <p>We are working on it. Check back soon, or get in touch at <a href="mailto:info@volition.org.nz">info@volition.org.nz</a> if you need help now.</p>
    <a class="back-link" href="..">← Back to all guides</a>
  </main>

  <footer>
    &copy; Volition Solutions Limited
  </footer>

</body>
</html>
